<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tutory Experience · Cobertura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0d0b;--s1:#141210;--s2:#1c1917;--s3:#242018;--s4:#2c2820;
  --border:#2e2a20;--border2:#3a3526;
  --gold:#c9a84c;--gold2:#e2c97a;--gold-bg:rgba(201,168,76,0.10);--gold-b:rgba(201,168,76,0.25);
  --text:#e8e2d4;--text2:#a89e8c;--text3:#6a6254;--text4:#3e3a30;
  --ni-bg:#3a3726;--ni-t:#7a7260;--ni-b:#4a4530;
  --ea-bg:#3a3010;--ea-t:#c9a030;--ea-b:#5a4820;
  --po-bg:#0e2a18;--po-t:#4aaa6a;--po-b:#1a4a28;
  --co-bg:#0e1e30;--co-t:#4a82c0;--co-b:#1a3050;
  --danger:#8a3040;--danger-t:#d06070;
  --safe-area-bottom:env(safe-area-inset-bottom,0px);
  --bottom-nav:56px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* ── TOP BAR ─────────────────── */
#topbar{
  flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--border);
  padding:0 16px;height:52px;display:flex;align-items:center;gap:12px;z-index:50;
}
.logo{font-family:'Playfair Display',serif;font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap}
.logo span{color:var(--text3);font-size:11px;font-weight:400}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.stat-mini{font-family:'DM Mono',monospace;font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid;cursor:default}
.stat-mini.ni{background:var(--ni-bg);color:var(--ni-t);border-color:var(--ni-b)}
.stat-mini.ea{background:var(--ea-bg);color:var(--ea-t);border-color:var(--ea-b)}
.stat-mini.po{background:var(--po-bg);color:var(--po-t);border-color:var(--po-b)}
.stat-mini.co{background:var(--co-bg);color:var(--co-t);border-color:var(--co-b)}
#prog-wrap{flex:1;max-width:160px;display:flex;flex-direction:column;gap:3px}
#prog-pct{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:right}
#prog-track{height:2px;background:var(--s4);border-radius:2px;overflow:hidden}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .4s ease;width:0%}

/* ── LAYOUT ─────────────────── */
#layout{flex:1;display:flex;overflow:hidden}

/* ── SIDEBAR (desktop) ─────── */
#sidebar{
  width:210px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;padding:16px 0;
}
.view-toggle{display:flex;margin:0 12px 12px;background:var(--s2);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.vt-btn{flex:1;padding:7px 0;text-align:center;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;transition:all .15s;border:none;background:none;font-family:'Syne',sans-serif;letter-spacing:.3px}
.vt-btn.active{background:var(--gold-bg);color:var(--gold2)}
.sidebar-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text4);padding:8px 16px 4px;display:block}
.nav-item{display:flex;align-items:center;gap:8px;padding:9px 16px;font-size:12px;font-weight:600;color:var(--text3);cursor:pointer;border-left:2px solid transparent;transition:all .15s;user-select:none}
.nav-item:hover{color:var(--text2);background:var(--gold-bg)}
.nav-item.active{color:var(--gold2);border-left-color:var(--gold);background:var(--gold-bg)}
.nav-item .ni-icon{font-size:13px;flex-shrink:0}
.nav-item .ni-count{margin-left:auto;font-family:'DM Mono',monospace;font-size:9px;color:var(--text4)}
.nav-item.active .ni-count{color:var(--gold)}
.person-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── MAIN ───────────────────── */
#main{flex:1;overflow-y:auto;padding:20px 16px 80px;-webkit-overflow-scrolling:touch}

/* ── VIEW HEADER ────────────── */
.view-header{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.vh-num{font-family:'Playfair Display',serif;font-size:40px;font-weight:700;color:rgba(201,168,76,.12);line-height:1;flex-shrink:0;user-select:none}
.vh-info h2{font-family:'Playfair Display',serif;font-size:18px;color:var(--text);font-weight:700;line-height:1.2}
.vh-info p{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:3px}
.vh-badge{margin-left:auto;flex-shrink:0;font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:4px;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-b)}

/* ── BLOCK ──────────────────── */
.block{margin-bottom:20px}
.block-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:9px 12px;background:var(--s2);border:1px solid var(--border);border-radius:6px;border-left:3px solid}
.bh-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;flex:1}
.bh-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3)}

/* ── TASK CARD ──────────────── */
.task-card{background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden;transition:border-color .15s}
.tc-strip{height:2px;transition:background .2s}
.strip-ni{background:var(--ni-b)}.strip-ea{background:var(--ea-t)}.strip-po{background:var(--po-t)}.strip-co{background:var(--co-t)}
.tc-top{display:flex;align-items:flex-start;gap:10px;padding:12px 12px 10px;cursor:pointer;min-height:0}
.tc-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);white-space:nowrap;min-width:44px;flex-shrink:0;margin-top:2px;line-height:1.3}
.tc-body{flex:1;min-width:0}
.tc-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:5px}
.tc-people{display:flex;flex-wrap:wrap;gap:3px}
.ptag{display:inline-flex;align-items:center;gap:3px;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid;letter-spacing:.2px;font-weight:500}
.tc-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;padding-left:4px}
.tc-expand{color:var(--text4);font-size:11px;transition:transform .2s;line-height:1;padding:2px}
.task-card.open .tc-expand{transform:rotate(180deg)}
.btn-edit{background:var(--s3);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-edit:hover,.btn-edit:active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-b)}

/* STATUS SELECTOR */
.status-sel{display:flex;gap:1px;background:var(--s3);border:1px solid var(--border2);border-radius:4px;overflow:hidden}
.ss-opt{padding:3px 6px;font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .12s;white-space:nowrap;border:none;background:transparent;color:var(--text4);font-weight:500}
.ss-opt:active{opacity:.7}
.ss-opt.active-ni{background:var(--ni-bg);color:var(--ni-t)}
.ss-opt.active-ea{background:var(--ea-bg);color:var(--ea-t)}
.ss-opt.active-po{background:var(--po-bg);color:var(--po-t)}
.ss-opt.active-co{background:var(--co-bg);color:var(--co-t)}

/* EXPANDED */
.tc-detail{display:none;padding:0 12px 12px 56px;font-size:12px;color:var(--text2);line-height:1.6;border-top:1px solid var(--border)}
.task-card.open .tc-detail{display:block}
.d-row{display:flex;gap:8px;margin-top:7px;align-items:flex-start}
.d-lbl{font-family:'DM Mono',monospace;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text4);min-width:58px;flex-shrink:0;margin-top:2px}
.d-val{color:var(--text2);font-size:12px}
.tipo-tag{display:inline-block;font-family:'DM Mono',monospace;font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--border2);color:var(--text3);background:var(--s3)}
.obs-box{background:var(--s3);border:1px solid var(--border);border-left:2px solid var(--gold-b);border-radius:4px;padding:8px 10px;margin-top:7px;font-size:11px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* ADD TASK BUTTON */
.btn-add-task{width:100%;padding:9px;background:transparent;border:1px dashed var(--border2);border-radius:6px;color:var(--text4);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-add-task:hover,.btn-add-task:active{border-color:var(--gold-b);color:var(--gold);background:var(--gold-bg)}

/* ── PERSON HEADER ──────────── */
.person-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--s2);border:1px solid var(--border);border-radius:8px;margin-bottom:16px}
.person-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px;font-weight:700;flex-shrink:0;border:2px solid}
.person-info h3{font-size:15px;font-weight:700;color:var(--text)}
.person-info p{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;margin-top:2px}
.person-tc{margin-left:auto;font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)}
.pdg-lbl{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin:12px 0 6px;display:block}

/* ── BOTTOM NAV (mobile) ─────── */
#bottom-nav{
  display:none;flex-shrink:0;background:var(--s1);border-top:1px solid var(--border);
  height:auto;
  padding-bottom:var(--safe-area-bottom);z-index:50;
}
.bn-tabs{display:flex;height:var(--bottom-nav)}
.bn-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:var(--text4);transition:all .15s;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.5px;text-transform:uppercase;border:none;background:none;padding:4px 2px}
.bn-tab .t-icon{font-size:16px;line-height:1}
.bn-tab.active{color:var(--gold)}
/* day sub-tabs */
#day-subtabs{display:none;background:var(--s2);border-top:1px solid var(--border);overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;white-space:nowrap;padding:0 4px}
.dst{display:inline-flex;align-items:center;padding:8px 12px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;scroll-snap-align:start;transition:all .15s;white-space:nowrap;font-family:'Syne',sans-serif}
.dst.active{color:var(--gold);border-bottom-color:var(--gold)}
/* person sub-tabs */
#person-subtabs{display:none;background:var(--s2);border-top:1px solid var(--border);overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;white-space:nowrap;padding:4px 6px 0;}
.pst{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 14px 8px;font-size:12px;font-weight:700;color:var(--text3);cursor:pointer;border-bottom:3px solid transparent;scroll-snap-align:start;transition:all .15s;white-space:nowrap;font-family:'Syne',sans-serif;min-width:72px;min-height:60px}
.pst.active{color:var(--text);border-bottom-color:var(--gold)}
.pst-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:11px;font-weight:700;border:2px solid;transition:all .15s}

/* ── FAB ────────────────────── */
#fab{position:fixed;bottom:calc(var(--bottom-nav) + var(--safe-area-bottom) + 12px);right:16px;width:48px;height:48px;background:var(--gold);border-radius:50%;border:none;cursor:pointer;font-size:22px;color:var(--bg);display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(201,168,76,.4);z-index:60;transition:transform .15s}
#fab:active{transform:scale(.92)}

/* ── MODAL ──────────────────── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:flex-end;justify-content:center}
#modal-overlay.active{display:flex}
#modal{
  background:var(--s1);border:1px solid var(--border2);border-radius:16px 16px 0 0;
  width:100%;max-width:600px;max-height:90vh;overflow-y:auto;
  padding:0 0 calc(20px + var(--safe-area-bottom));
  transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);
  -webkit-overflow-scrolling:touch;
}
#modal-overlay.active #modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-title{font-size:15px;font-weight:700;color:var(--text);flex:1}
.btn-modal-del{background:rgba(138,48,64,.15);border:1px solid var(--danger);border-radius:6px;padding:6px 12px;color:var(--danger-t);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer}
.btn-modal-del:active{opacity:.7}
.btn-modal-close{background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text3);font-size:14px;cursor:pointer;line-height:1}
.modal-body{padding:16px 20px}
.field-group{margin-bottom:14px}
.field-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text4);margin-bottom:5px;display:block}
.field-input,.field-textarea,.field-select{width:100%;background:var(--s3);border:1px solid var(--border2);border-radius:6px;padding:10px 12px;color:var(--text);font-family:'Syne',sans-serif;font-size:13px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.field-input:focus,.field-textarea:focus,.field-select:focus{border-color:var(--gold-b)}
.field-textarea{resize:vertical;min-height:80px;line-height:1.6}
.field-select{background-color:var(--s3);color:var(--text)}
.field-select option{background:var(--s2);color:var(--text)}
/* People chips */
.people-chips{display:flex;flex-wrap:wrap;gap:6px}
.pchip{padding:5px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--s3);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s;user-select:none}
.pchip.selected{border-width:1.5px}
/* Block chips */
.block-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.bchip{padding:5px 10px;border-radius:4px;border:1px solid var(--border2);background:var(--s3);font-size:10px;font-weight:600;color:var(--text3);cursor:pointer;transition:all .12s;user-select:none}
.bchip.selected{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-b)}
/* Status chips */
.status-chips{display:flex;gap:6px;flex-wrap:wrap}
.schip{padding:5px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--s3);font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);cursor:pointer;transition:all .12s}
.schip.s-ni.sel{background:var(--ni-bg);color:var(--ni-t);border-color:var(--ni-b)}
.schip.s-ea.sel{background:var(--ea-bg);color:var(--ea-t);border-color:var(--ea-b)}
.schip.s-po.sel{background:var(--po-bg);color:var(--po-t);border-color:var(--po-b)}
.schip.s-co.sel{background:var(--co-bg);color:var(--co-t);border-color:var(--co-b)}
/* Save btn */
.btn-save{width:100%;padding:14px;background:var(--gold);border:none;border-radius:8px;color:var(--bg);font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;transition:opacity .15s}
.btn-save:active{opacity:.8}

/* ── DESKTOP OVERRIDES ──────── */
@media(min-width:600px){
  #sidebar{display:flex}
  #bottom-nav,#day-subtabs,#person-subtabs,#fab{display:none !important}
  #main{padding:24px 28px 40px}
  #modal-overlay{align-items:center}
  #modal{border-radius:12px;max-height:80vh;transform:scale(.95) translateY(10px);opacity:0;transition:all .25s cubic-bezier(.32,1,.23,1)}
  #modal-overlay.active #modal{transform:scale(1) translateY(0);opacity:1}
  .tc-time{min-width:52px;font-size:11px}
  .tc-title{font-size:13px}
  .status-sel .ss-opt{padding:3px 7px;font-size:9px}
  #fab{display:none}
}
@media(max-width:599px){
  #sidebar{display:none}
  #bottom-nav{display:flex;flex-direction:column}
  #fab{display:flex}
  #topbar{height:48px;padding:0 12px}
  .logo{font-size:13px}
  #prog-wrap{max-width:110px}
  .stat-mini{font-size:9px;padding:2px 5px}
  #main{padding:14px 12px 80px}
  .view-header{margin-bottom:14px;padding-bottom:12px}
  .vh-num{font-size:32px}
  .vh-info h2{font-size:16px}
  .tc-top{padding:10px 10px 8px}
  .tc-title{font-size:12px}
  .tc-time{min-width:38px;font-size:9px}
  .status-sel .ss-opt{font-size:8px;padding:2px 4px}
  .btn-edit{font-size:8px;padding:3px 6px}
  .tc-detail{padding:0 10px 10px 50px}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.task-card{animation:fadeIn .18s ease both}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:var(--text4);text-align:center;gap:6px}
.empty-state .ei{font-size:28px;margin-bottom:6px}
.empty-state h3{font-size:15px;color:var(--text3)}
.empty-state p{font-size:12px}

/* Confirm dialog */
#confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#confirm-overlay.active{display:flex}
#confirm-box{background:var(--s1);border:1px solid var(--border2);border-radius:12px;padding:24px;width:100%;max-width:320px}
#confirm-box p{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;gap:8px}
.btn-no{flex:1;padding:10px;background:var(--s3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-yes{flex:1;padding:10px;background:rgba(138,48,64,.2);border:1px solid var(--danger);border-radius:6px;color:var(--danger-t);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
</style>
</head>
<body>

<div id="topbar">
  <div class="logo">Tutory <span>· Cobertura</span></div>
  <div id="prog-wrap">
    <div id="prog-pct" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:right">0%</div>
    <div id="prog-track"><div id="prog-fill"></div></div>
  </div>
  <div class="top-right">
    <div class="stat-mini ea"><span id="cnt-ea">0</span></div>
    <div class="stat-mini po"><span id="cnt-po">0</span></div>
    <div class="stat-mini co"><span id="cnt-co">0</span></div>
  </div>
</div>

<div id="layout">
  <div id="sidebar">
    <div class="view-toggle">
      <button class="vt-btn active" onclick="setView('day')">Por Dia</button>
      <button class="vt-btn" onclick="setView('person')">Por Pessoa</button>
    </div>
    <div id="day-nav">
      <span class="sidebar-label">Dias</span>
      <div class="nav-item active" onclick="selectDay('quinta')" id="nav-quinta"><span class="ni-icon">🔧</span>Quinta · 09/04<span class="ni-count" id="dc-quinta"></span></div>
      <div class="nav-item" onclick="selectDay('sexta')" id="nav-sexta"><span class="ni-icon">🎙</span>Sexta · 10/04<span class="ni-count" id="dc-sexta"></span></div>
      <div class="nav-item" onclick="selectDay('sabado')" id="nav-sabado"><span class="ni-icon">🎤</span>Sábado · 11/04<span class="ni-count" id="dc-sabado"></span></div>
      <div class="nav-item" onclick="selectDay('pos')" id="nav-pos"><span class="ni-icon">📦</span>Pós-Evento<span class="ni-count" id="dc-pos"></span></div>
    </div>
    <div id="person-nav" style="display:none">
      <span class="sidebar-label">Pessoas</span>
    </div>
  </div>
  <div id="main"></div>
</div>

<!-- Mobile Bottom Nav -->
<div id="bottom-nav">
  <div id="day-subtabs"></div>
  <div id="person-subtabs"></div>
  <div class="bn-tabs">

let idCounter = 1000;
const state = { view:'day', day:'quinta', person:'Gabriella' };
let editingId = null;

// ── HELPERS ─────────────────────────────────────────
function sc(s){ return {['nao-iniciado']:'ni',['em-andamento']:'ea',postado:'po',concluido:'co'}[s]||'ni' }
function ptag(n){
  const p=PEOPLE[n]||{color:'#888',bg:'rgba(128,128,128,.1)',border:'rgba(128,128,128,.3)'};
  return `<span class="ptag" style="color:${p.color};background:${p.bg};border-color:${p.border}">${n}</span>`;
}
function getTask(id){ return tasks.find(t=>t.id===id) }
function newId(){ return 'task-'+(++idCounter) }

function updateStats(){
  const cnt={'nao-iniciado':0,'em-andamento':0,postado:0,concluido:0};
  tasks.forEach(t=>cnt[t.status]++);
  document.getElementById('cnt-ea').textContent=cnt['em-andamento'];
  document.getElementById('cnt-po').textContent=cnt.postado;
  document.getElementById('cnt-co').textContent=cnt.concluido;
  const total=tasks.length, done=cnt.concluido+cnt.postado;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  ['quinta','sexta','sabado','pos'].forEach(d=>{
    const dt=tasks.filter(t=>t.day===d);
    const dn=dt.filter(t=>t.status==='concluido'||t.status==='postado').length;
    const el=document.getElementById('dc-'+d);
    if(el) el.textContent=dn+'/'+dt.length;
  });
}

// ── CARD RENDER ─────────────────────────────────────
function renderCard(t){
  const s=t.status, k=sc(s);
  const bc=BLOCKS[t.block]||BLOCKS.setup;
  const btns=[
    ['nao-iniciado','N/I'],['em-andamento','…'],['postado','Post'],['concluido','✓']
  ].map(([v,l])=>
    `<button class="ss-opt${s===v?' active-'+sc(v):''}" data-val="${v}" onclick="quickStatus('${t.id}','${v}',this);event.stopPropagation()">${l}</button>`
  ).join('');

  const detail=`<div class="tc-detail">
    <div class="d-row"><span class="d-lbl">Tipo</span><span class="tipo-tag">${t.tipo||'—'}</span></div>
    ${t.equip&&t.equip!=='—'?`<div class="d-row"><span class="d-lbl">Equip.</span><span class="d-val">${t.equip}</span></div>`:''}
    ${t.obs?`<div class="obs-box">${t.obs.replace(/\n/g,'<br>')}</div>`:''}
  </div>`;

  return `<div class="task-card" id="card-${t.id}">
    <div class="tc-strip strip-${k}"></div>
    <div class="tc-top" onclick="toggleCard('${t.id}')">
      <div class="tc-time">${t.time||'—'}</div>
      <div class="tc-body">
        <div class="tc-title">${t.title}</div>
        <div class="tc-people">${t.people.map(ptag).join('')}</div>
      </div>
      <div class="tc-actions">
        <div class="status-sel">${btns}</div>
        <div style="display:flex;gap:4px;align-items:center">
          <button class="btn-edit" onclick="openEditModal('${t.id}');event.stopPropagation()">✏ editar</button>
          <div class="tc-expand">▾</div>
        </div>
      </div>
    </div>${detail}
  </div>`;
}

function toggleCard(id){
  document.getElementById('card-'+id)?.classList.toggle('open');
}

function quickStatus(id,val,el){
  const t=getTask(id); if(!t) return;
  t.status=val;
  const card=document.getElementById('card-'+id);
  card.querySelector('.tc-strip').className='tc-strip strip-'+sc(val);
  card.querySelectorAll('.ss-opt').forEach(b=>{
    b.className='ss-opt'+(b.dataset.val===val?' active-'+sc(val):'');
  });
  updateStats();
}

// ── DAY VIEW ─────────────────────────────────────────
function renderDayView(day){
  const d=DAYS[day], ts=tasks.filter(t=>t.day===day);
  const done=ts.filter(t=>t.status==='concluido'||t.status==='postado').length;
  const blocks={}, order=[];
  ts.forEach(t=>{
    if(!blocks[t.blockLabel]){blocks[t.blockLabel]={key:t.block,tasks:[]};order.push(t.blockLabel)}
    blocks[t.blockLabel].tasks.push(t);
  });
  const html=order.map(bl=>{
    const b=blocks[bl], bc=BLOCKS[b.key]||BLOCKS.setup;
    const bdn=b.tasks.filter(t=>t.status==='concluido'||t.status==='postado').length;
    return `<div class="block">
      <div class="block-header" style="border-left-color:${bc.color}">
        <span class="bh-title" style="color:${bc.color}">${bl}</span>
        <span class="bh-count">${bdn}/${b.tasks.length}</span>
      </div>
      ${b.tasks.map(renderCard).join('')}
      <button class="btn-add-task" onclick="openAddModal('${day}','${b.key}','${bl}')">+ adicionar tarefa neste bloco</button>
    </div>`;
  }).join('');
  return `<div class="view-header">
    <div class="vh-num">${d.num}</div>
    <div class="vh-info"><h2>${d.icon} ${d.label}</h2><p>${d.date} · ${ts.length} tarefas</p></div>
    <div class="vh-badge">${done}/${ts.length}</div>
  </div>${html}
  <button class="btn-add-task" style="margin-top:8px" onclick="openAddModal('${day}')">+ novo bloco / tarefa no dia</button>`;
}

// ── PERSON VIEW ──────────────────────────────────────
function renderPersonView(name){
  const p=PEOPLE[name]||{color:'#c9a84c',bg:'rgba(201,168,76,.12)',border:'rgba(201,168,76,.3)',role:'',av:name[0]};
  const ts=tasks.filter(t=>t.people.includes(name));
  const done=ts.filter(t=>t.status==='concluido'||t.status==='postado').length;
  const byDay={};
  ts.forEach(t=>{ if(!byDay[t.day]) byDay[t.day]=[]; byDay[t.day].push(t); });
  const dHtml=['quinta','sexta','sabado','pos'].filter(d=>byDay[d]).map(d=>{
    const info=DAYS[d];
    return `<div><span class="pdg-lbl">${info.icon} ${info.label} · ${info.date}</span>
    ${byDay[d].map(renderCard).join('')}</div>`;
  }).join('');
  return `<div class="person-hdr">
    <div class="person-av" style="background:${p.bg};color:${p.color};border-color:${p.border}">${p.av}</div>
    <div class="person-info"><h3>${name}</h3><p>${p.role}</p></div>
    <div class="person-tc">${done}/${ts.length}</div>
  </div>${dHtml||'<div class="empty-state"><div class="ei">📭</div><h3>Sem tarefas</h3><p>Nenhuma tarefa atribuída.</p></div>'}`;
}

// ── NAVIGATION ───────────────────────────────────────
function setView(v){
  state.view=v;
  document.querySelectorAll('.vt-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='day')||(i===1&&v==='person')));
  document.getElementById('day-nav').style.display=v==='day'?'block':'none';
  document.getElementById('person-nav').style.display=v==='person'?'block':'none';
  document.getElementById('day-subtabs').style.display=v==='day'?'block':'none';
  document.getElementById('person-subtabs').style.display=v==='person'?'block':'none';
  document.getElementById('bn-day').classList.toggle('active',v==='day');
  document.getElementById('bn-person').classList.toggle('active',v==='person');
  if(v==='day') selectDay(state.day||'quinta');
  else selectPerson(state.person||'Gabriella');
}

function selectDay(day){
  state.day=day;
  document.querySelectorAll('#day-nav .nav-item').forEach(n=>n.classList.toggle('active',n.id==='nav-'+day));
  document.querySelectorAll('.dst').forEach(n=>n.classList.toggle('active',n.dataset.day===day));
  document.getElementById('main').innerHTML=renderDayView(day);
  document.getElementById('main').scrollTop=0;
  updateStats();
}

function selectPerson(name){
  state.person=name;
  document.querySelectorAll('#person-nav .nav-item').forEach(n=>n.classList.toggle('active',n.dataset.person===name));
  document.querySelectorAll('.pst').forEach(n=>n.classList.toggle('active',n.dataset.person===name));
  document.getElementById('main').innerHTML=renderPersonView(name);
  document.getElementById('main').scrollTop=0;
}

// ── MODAL ────────────────────────────────────────────
function buildBlockChips(selectedKey){
  return Object.entries(BLOCKS).map(([k,b])=>
    `<div class="bchip${selectedKey===k?' selected':''}" data-block="${k}" onclick="selectBlockChip(this)" style="border-color:${selectedKey===k?b.color:'var(--border2)'};color:${selectedKey===k?b.color:'var(--text3)'}">${b.label}</div>`
  ).join('');
}

function buildPeopleChips(selectedPeople){
  return Object.entries(PEOPLE).map(([n,p])=>
    `<div class="pchip${selectedPeople.includes(n)?' selected':''}" data-person="${n}" onclick="togglePeopleChip(this)" style="${selectedPeople.includes(n)?`background:${p.bg};color:${p.color};border-color:${p.border}`:''}">
      <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${p.color};margin-right:4px;vertical-align:middle"></span>${n}
    </div>`
  ).join('');
}

function openAddModal(day, blockKey, blockLabel){
  editingId=null;
  document.getElementById('modal-title').textContent='Nova Tarefa';
  document.getElementById('btn-del').style.display='none';
  document.getElementById('edit-id').value='';
  document.getElementById('f-title').value='';
  document.getElementById('f-time').value='';
  document.getElementById('f-day').value=day||state.day||'quinta';
  document.getElementById('f-tipo').value='';
  document.getElementById('f-equip').value='';
  document.getElementById('f-obs').value='';
  document.getElementById('block-chips').innerHTML=buildBlockChips(blockKey||'setup');
  document.getElementById('people-chips').innerHTML=buildPeopleChips([]);
  document.querySelectorAll('.schip').forEach(c=>{ c.classList.remove('sel'); if(c.dataset.val==='nao-iniciado') c.classList.add('sel'); });
  openModal();
}

function openEditModal(id){
  const t=getTask(id); if(!t) return;
  editingId=id;
  document.getElementById('modal-title').textContent='Editar Tarefa';
  document.getElementById('btn-del').style.display='block';
  document.getElementById('edit-id').value=id;
  document.getElementById('f-title').value=t.title;
  document.getElementById('f-time').value=t.time;
  document.getElementById('f-day').value=t.day;
  document.getElementById('f-tipo').value=t.tipo||'';
  document.getElementById('f-equip').value=t.equip||'';
  document.getElementById('f-obs').value=t.obs||'';
  document.getElementById('block-chips').innerHTML=buildBlockChips(t.block);
  document.getElementById('people-chips').innerHTML=buildPeopleChips(t.people);
  document.querySelectorAll('.schip').forEach(c=>{ c.classList.toggle('sel',c.dataset.val===t.status); });
  openModal();
}

function openModal(){
  document.getElementById('modal-overlay').classList.add('active');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('active');
  document.body.style.overflow='';
}

function handleOverlayClick(e){
  if(e.target===document.getElementById('modal-overlay')) closeModal();
}

function selectBlockChip(el){
  document.querySelectorAll('.bchip').forEach(c=>{ c.classList.remove('selected'); c.style.borderColor='var(--border2)'; c.style.color='var(--text3)'; });
  const k=el.dataset.block, b=BLOCKS[k]||{color:'var(--gold)'};
  el.classList.add('selected'); el.style.borderColor=b.color; el.style.color=b.color;
}

function togglePeopleChip(el){
  const n=el.dataset.person, p=PEOPLE[n]||{};
  el.classList.toggle('selected');
  if(el.classList.contains('selected')){ el.style.background=p.bg; el.style.color=p.color; el.style.borderColor=p.border; }
  else { el.style.background=''; el.style.color=''; el.style.borderColor=''; }
}

function selectStatusChip(el){
  document.querySelectorAll('.schip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
}

function getSelectedBlock(){ return document.querySelector('.bchip.selected')?.dataset.block||'setup' }
function getSelectedPeople(){ return [...document.querySelectorAll('.pchip.selected')].map(c=>c.dataset.person) }
function getSelectedStatus(){ return document.querySelector('.schip.sel')?.dataset.val||'nao-iniciado' }
function getSelectedBlockLabel(){ const k=getSelectedBlock(); return BLOCKS[k]?.label||k }

function saveTask(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){ document.getElementById('f-title').style.borderColor='var(--danger)'; return; }
  document.getElementById('f-title').style.borderColor='';

  const data={
    title, time:document.getElementById('f-time').value.trim()||'—',
    day:document.getElementById('f-day').value,
    block:getSelectedBlock(), blockLabel:getSelectedBlockLabel(),
    people:getSelectedPeople(), tipo:document.getElementById('f-tipo').value.trim(),
    equip:document.getElementById('f-equip').value.trim()||'—',
    obs:document.getElementById('f-obs').value.trim(),
    status:getSelectedStatus(),
  };

  if(editingId){
    const idx=tasks.findIndex(t=>t.id===editingId);
    if(idx>-1) tasks[idx]={...tasks[idx],...data};
  } else {
    tasks.push({id:newId(),...data});
  }

  closeModal();
  if(state.view==='day') selectDay(state.day);
  else selectPerson(state.person);
}

let pendingDeleteId=null;
function confirmDelete(){
  const id=document.getElementById('edit-id').value;
  pendingDeleteId=id;
  document.getElementById('confirm-overlay').classList.add('active');
}

function deleteTask(){
  if(pendingDeleteId){
    tasks=tasks.filter(t=>t.id!==pendingDeleteId);
    pendingDeleteId=null;
  }
  document.getElementById('confirm-overlay').classList.remove('active');
  closeModal();
  if(state.view==='day') selectDay(state.day);
  else selectPerson(state.person);
}

// ── INIT ────────────────────────────────────────────
function init(){
  // Sidebar person nav
  const pnav=document.getElementById('person-nav');
  Object.entries(PEOPLE).forEach(([n,p])=>{
    const tc=tasks.filter(t=>t.people.includes(n)).length;
    pnav.innerHTML+=`<div class="nav-item" onclick="selectPerson('${n}')" data-person="${n}" id="pnav-${n}">
      <span class="person-dot" style="background:${p.color}"></span>${n}<span class="ni-count">${tc}</span>
    </div>`;
  });

  // Mobile day subtabs
  const dst=document.getElementById('day-subtabs');
  Object.entries(DAYS).forEach(([k,d])=>{
    dst.innerHTML+=`<div class="dst${k==='quinta'?' active':''}" data-day="${k}" onclick="selectDay('${k}')">${d.icon} ${d.label}</div>`;
  });

  // Mobile person subtabs
  const pst=document.getElementById('person-subtabs');
  Object.entries(PEOPLE).forEach(([n,p])=>{
    pst.innerHTML+=`<div class="pst" data-person="${n}" onclick="selectPerson('${n}')">
      <span class="pst-dot" style="background:${p.bg};color:${p.color};border-color:${p.border}">${p.av}</span>
      <span>${n}</span>
    </div>`;
  });

  updateStats();
  selectDay('quinta');
}

init();
</script>
</body>
</html>
